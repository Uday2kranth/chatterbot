<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Multi-Model AI Chatbot Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Floating Theme Switcher -->
  <button class="theme-toggle-floating" id="theme-toggle-btn" aria-label="Toggle Theme">
    <i class="fa-solid fa-moon"></i>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <i class="fa-solid fa-robot"></i>
        </div>
        <h1 class="login-title">ChatterBot</h1>
        <p class="login-subtitle">Multi-Model AI Chatbot Dashboard</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
            <i class="fa-solid fa-user"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            <i class="fa-solid fa-lock"></i>
          </div>
          <!-- Clean inline error text below input -->
          <div class="error-message" id="error-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">Incorrect username or password.</span>
          </div>
        </div>

        <button type="submit" class="login-btn" id="submit-btn">
          <span>Log In</span>
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    // 1. Immutable authorized users database
    const AUTHORIZED_USERS = {
      "Admin@uday": { password: "Superm@n62", role: "admin" },
      "Sai_Kiran": { password: "kiransir@bava", role: "student" },
      "Gagan": { password: "gagan@kranthi", role: "student" },
      "Akash": { password: "labbe@kiransir", role: "student" },
      "Sai_Ram": { password: "sai@ram", role: "student" },
      "Tharun": { password: "mama@kiransir", role: "student" },
      "Ban": { password: "DataScientist", role: "student" }
    };

    // 2. Initialize Theme Setting
    const themeBtn = document.getElementById('theme-toggle-btn');
    const currentTheme = localStorage.getItem('chatterbot_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeBtn.addEventListener('click', () => {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('chatterbot_theme', theme);
      updateThemeIcon(theme);
    });

    function updateThemeIcon(theme) {
      const icon = themeBtn.querySelector('i');
      if (theme === 'dark') {
        icon.className = 'fa-solid fa-moon';
      } else {
        icon.className = 'fa-solid fa-sun';
      }
    }

    // 3. Prevent landing on login screen if user is already logged in
    const activeSession = localStorage.getItem('chatterbot_session');
    if (activeSession) {
      try {
        const session = JSON.parse(activeSession);
        if (session && session.user) {
          window.location.href = 'index.html';
        }
      } catch (e) {
        localStorage.removeItem('chatterbot_session');
      }
    }

    // 4. Form Submit & Authentication Guard
    const loginForm = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const submitBtn = document.getElementById('submit-btn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      // Reset loading & error UI
      errorMessage.style.display = 'none';
      submitBtn.disabled = true;
      const originalBtnHTML = submitBtn.innerHTML;
      submitBtn.innerHTML = `<span>Verifying...</span><i class="fa-solid fa-spinner fa-spin"></i>`;

      const userRecord = AUTHORIZED_USERS[username];

      // Simulate a small latency for smooth interactive experience
      setTimeout(async () => {
        if (userRecord && userRecord.password === password) {
          // Store session
          const sessionData = {
            user: username,
            role: userRecord.role,
            timestamp: Date.now()
          };
          localStorage.setItem('chatterbot_session', JSON.stringify(sessionData));

          // Log Login to Google Sheets asynchronously in the background via secure API
          try {
            await fetch('/api/log', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                type: 'auth',
                action: 'login',
                user: username,
                time: new Date().toLocaleString(),
                details: `Logged in from web application frontend.`
              })
            });
          } catch (err) {
            console.error('Failed to register authentication log:', err);
          }

          // Redirect to Chat Dashboard
          window.location.href = 'index.html';
        } else {
          // Login Failed
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnHTML;
          errorText.textContent = "Incorrect username or password. Please try again.";
          errorMessage.style.display = 'flex';
          passwordInput.value = '';
          passwordInput.focus();
        }
      }, 600);
    });
  </script>
</body>
</html>
