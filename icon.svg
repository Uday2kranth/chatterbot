<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8b5cf6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="#0b0f19" />
  
  <!-- Outer Glow Effect -->
  <circle cx="256" cy="256" r="220" fill="url(#glow-grad)" />

  <!-- Code Brackets Background -->
  <path d="M 120 180 L 70 256 L 120 332" fill="none" stroke="#334155" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 392 180 L 442 256 L 392 332" fill="none" stroke="#334155" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

  <g filter="url(#shadow)">
    <!-- Graduation Cap Top -->
    <polygon points="256,120 380,180 256,240 132,180" fill="url(#purple-grad)" />
    
    <!-- Cap Cap Skull/Bottom -->
    <path d="M 190 208 L 190 250 C 190 280, 322 280, 322 250 L 322 208" fill="#7c3aed" opacity="0.95" />
    
    <!-- Tassel -->
    <path d="M 256 180 L 150 200 L 140 250" fill="none" stroke="#f472b6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="140" cy="255" r="8" fill="#f472b6" />

    <!-- Glowing Brain Lines Embedded -->
    <path d="M 220 310 C 200 310, 180 330, 180 350 C 180 370, 200 380, 220 380" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" />
    <path d="M 292 310 C 312 310, 332 330, 332 350 C 332 370, 312 380, 292 380" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" />
    <path d="M 220 345 H 292" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" />
    <path d="M 256 345 V 410" fill="none" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" />
    
    <path d="M 220 410 C 230 420, 282 420, 292 410" fill="none" stroke="#f472b6" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>